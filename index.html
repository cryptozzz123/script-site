<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptNow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* LIGHT */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle 220px at var(--x,50%) var(--y,50%), rgba(0,255,255,0.08), transparent 60%);
  pointer-events:none;
}

/* GRID */
canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:10;
}

.nav-links span{
  margin-left:20px;
  cursor:pointer;
  opacity:.7;
}
.nav-links span:hover{opacity:1}

/* SECTIONS */
section{
  display:none;
  min-height:100vh;
  padding-top:120px;
}
section.active{
  display:block;
  animation:fade .4s;
}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

.hero h1{
  font-size:55px;
  font-weight:900;
  background:linear-gradient(90deg,#0ff,#00aaff,#0ff);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  margin-top:10px;
  color:#bbb;
}

/* WRAPPER */
.wrapper{
  max-width:1100px;
  margin:auto;
}

/* CARDS */
.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.04);
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  transition:.3s;
}
.card:hover{
  transform:translateY(-5px);
  border-color:#0ff;
  box-shadow:0 0 20px rgba(0,255,255,0.25);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{padding:12px}

.desc{
  font-size:10px;
  color:#aaa;
  word-break:break-all;
}

.long-desc{
  font-size:11px;
  color:#888;
  margin-top:6px;
}

.meta{
  font-size:11px;
  color:#777;
  margin-top:4px;
}

.copy-btn{
  width:100%;
  margin-top:8px;
  padding:7px;
  border:none;
  border-radius:8px;
  background:white;
  color:black;
  cursor:pointer;
}

/* SEARCH */
.search{
  margin:20px auto;
  display:block;
  width:80%;
  max-width:350px;
  padding:8px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

/* COMING */
.coming{
  text-align:center;
  font-size:32px;
  font-weight:900;
  padding:60px;
  background:linear-gradient(90deg,#0ff,#00aaff,#0ff);
  -webkit-background-clip:text;
  color:transparent;
}
</style>
</head>

<body>

<canvas id="grid"></canvas>

<nav>
<div style="color:white;font-weight:800;">ScriptNow</div>
<div class="nav-links">
<span onclick="showSection('home')">Home</span>
<span onclick="showSection('scripts')">Scripts</span>
<span onclick="showSection('about')">About</span>
</div>
</nav>

<!-- HOME -->
<section id="home" class="active">
<div class="hero">
<h1>ScriptNow</h1>
<p>Premium Roblox script hub with Velocity-style UI.</p>
<p>Built in 2026</p>
</div>
</section>

<!-- SCRIPTS -->
<section id="scripts">

<input class="search" id="search" placeholder="Search..." onkeyup="searchScripts()">

<div class="wrapper">
<div class="container">

<!-- (ALL YOUR CARDS STAY SAME, NOT TOUCHING THEM) -->

</div>
</div>

<div class="coming">More Scripts Coming Soon.</div>

<div style="text-align:center;margin-top:-40px;margin-bottom:60px;font-size:14px;color:#aaa;">
Made with Elite <span style="text-decoration:underline;color:#0ff;">Power</span>
</div>

</section>

<!-- ABOUT -->
<section id="about">
<div class="hero">
<h1>About</h1>
<p>This is a premium Roblox script hub inspired by Velocity UI.</p>
<p>Owner: @Mybrocrashedout</p>
</div>
</section>

<script>
function showSection(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

function copyScriptText(text){
navigator.clipboard.writeText(text)
alert('Copied!')
}

function searchScripts(){
let input=document.getElementById('search').value.toLowerCase()
document.querySelectorAll('.card').forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(input)?'block':'none'
})
}

/* LIGHT */
window.addEventListener('mousemove',e=>{
document.body.style.setProperty('--x', e.clientX+'px')
document.body.style.setProperty('--y', e.clientY+'px')
})

/* GRID */
const canvas=document.getElementById('grid')
const ctx=canvas.getContext('2d')
canvas.width=innerWidth
canvas.height=innerHeight

let mouse={x:0,y:0}
addEventListener('mousemove',e=>{
mouse.x=e.clientX
mouse.y=e.clientY
})

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
for(let x=0;x<canvas.width;x+=40){
for(let y=0;y<canvas.height;y+=40){
let dx=mouse.x-x,dy=mouse.y-y
let d=Math.sqrt(dx*dx+dy*dy)
let o=Math.max(0,1-d/200)
if(o>0){
ctx.fillStyle=`rgba(0,255,255,${o*0.15})`
ctx.fillRect(x,y,38,38)
}
}}
requestAnimationFrame(draw)
}
draw()
</script>

</body>
</html>
