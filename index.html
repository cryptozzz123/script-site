<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptNow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* LIGHT FOLLOW */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle 220px at var(--x,50%) var(--y,50%), rgba(0,255,255,0.08), transparent 60%);
  pointer-events:none;
}

/* GRID */
canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:10;
}

.nav-links span{
  margin-left:20px;
  cursor:pointer;
  font-weight:600;
}

/* SECTION */
section{
  display:none;
  min-height:100vh;
  padding-top:120px;
}
section.active{display:block}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
}
.hero h1{
  font-size:55px;
  font-weight:900;
}
.hero p{
  color:#bbb;
}

/* GRID CARDS */
.container{
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  transition:.3s;
}
.card:hover{
  transform:translateY(-6px);
  box-shadow:0 0 25px rgba(0,255,255,0.35);
  border-color:#0ff;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{padding:12px}

.desc{
  font-size:11px;
  color:#ccc;
  word-break:break-all;
}

.meta{
  font-size:12px;
  color:#aaa;
  margin-top:4px;
}

.copy-btn{
  width:100%;
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:white;
  color:black;
  font-weight:700;
  cursor:pointer;
}

/* SEARCH */
.search{
  margin:20px auto;
  display:block;
  width:80%;
  max-width:350px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}
</style>
</head>

<body>

<canvas id="grid"></canvas>

<nav>
<div style="font-weight:900;">ScriptNow</div>
<div class="nav-links">
<span onclick="showSection('home')">Home</span>
<span onclick="showSection('scripts')">Scripts</span>
<span onclick="showSection('about')">About</span>
</div>
</nav>

<!-- HOME -->
<section id="home" class="active">
<div class="hero">
<h1>ScriptNow</h1>
<p>Premium Roblox script hub</p>

<div style="margin-top:20px;color:#aaa;">
Made with Elite <span style="text-decoration:underline;color:#0ff;">Power</span>
</div>
</div>

<div class="container" id="homeScripts"></div>
</section>

<!-- SCRIPTS -->
<section id="scripts">
<input class="search" placeholder="Search..." onkeyup="searchScripts(this)">
<div class="container" id="allScripts"></div>
</section>

<!-- ABOUT -->
<section id="about">
<div class="hero">
<h1>About</h1>
<p>Owner: @Mybrocrashedout</p>
</div>
</section>

<script>

/* 🔥 SCRIPT DATA (ONLY ONE SOURCE = NO MISSING BUG EVER AGAIN) */
const scripts = [
{
name:"Infinite Yield",
img:"https://i.ytimg.com/vi/OR3HDLmVJlk/maxresdefault.jpg",
load:`loadstring(game:HttpGet("https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source"))()`,
supported:"Universal",
status:"Operational"
},
{
name:"HoHo Hub",
img:"https://i.ytimg.com/vi/H_C1PSElQGw/maxresdefault.jpg",
load:`loadstring(game:HttpGet("https://raw.githubusercontent.com/acsu123/HOHO_H/main/Loading_UI"))()`,
supported:"Multi",
status:"Operational"
},
{
name:"Quantum Onyx",
img:"https://i.ytimg.com/vi/N6Un-tdrFJw/maxresdefault.jpg",
load:`loadstring(game:HttpGet("https://raw.githubusercontent.com/flazhy/QuantumOnyx/main/QuantumOnyx.lua"))()`,
supported:"Blox Fruits",
status:"Operational"
},
{
name:"NullFire",
img:"https://scriptblox.com/images/script/0-1765399635373.png",
load:`loadstring(game:HttpGet("https://raw.githubusercontent.com/TeamNullFire/NullFire/main/loader.lua"))()`,
supported:"Doors/NDS",
status:"Operational"
},
{
name:"Moondeity Hub",
img:"https://scriptblox.com/images/script/0-1753093706828.png",
load:`loadstring(game:HttpGet("https://moondiety.com/loader"))()`,
supported:"Multi",
status:"Operational"
},
{
name:"Deluxed Hub",
img:"https://th.bing.com/th/id/OIP.Altclxeb5dRElDmff-YBdQHaEK?w=331&h=186",
load:`loadstring(game:HttpGet("https://raw.githubusercontent.com/VearyTry/DeluxedHub/main/dandysworld.lua",true))()`,
supported:"Dandys World",
status:"Operational"
},
{
name:"Dropkick Fling",
img:"https://scriptblox.com/images/script/0-1776041891249.jpg",
load:`loadstring(game:HttpGet("https://raw.githubusercontent.com/platinww/CrustyMain/refs/heads/main/universal/DropKick.lua"))()`,
supported:"Universal",
status:"Operational"
}
];

/* RENDER */
function render(){
let home=document.getElementById("homeScripts");
let all=document.getElementById("allScripts");

scripts.forEach(s=>{
let card=`
<div class="card">
<img src="${s.img}">
<div class="card-content">
<h3>${s.name}</h3>
<div class="desc">${s.load}</div>
<div class="meta">Supported: ${s.supported}</div>
<div class="meta">Status: ${s.status}</div>
<button class="copy-btn" onclick='copyScriptText(\`${s.load}\`)'>Copy Script</button>
</div></div>`;

home.innerHTML+=card;
all.innerHTML+=card;
});
}
render();

/* NAV */
function showSection(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

/* COPY */
function copyScriptText(t){
navigator.clipboard.writeText(t)
alert("Copied!")
}

/* SEARCH */
function searchScripts(input){
let val=input.value.toLowerCase()
document.querySelectorAll('#allScripts .card').forEach(card=>{
card.style.display = card.innerText.toLowerCase().includes(val) ? "block":"none"
})
}

/* LIGHT */
window.addEventListener('mousemove',e=>{
document.body.style.setProperty('--x', e.clientX+'px')
document.body.style.setProperty('--y', e.clientY+'px')
})

/* GRID */
const c=document.getElementById('grid')
const ctx=c.getContext('2d')
c.width=innerWidth
c.height=innerHeight
let m={x:0,y:0}
addEventListener('mousemove',e=>{m.x=e.clientX;m.y=e.clientY})

function draw(){
ctx.clearRect(0,0,c.width,c.height)
for(let x=0;x<c.width;x+=40){
for(let y=0;y<c.height;y+=40){
let d=Math.hypot(m.x-x,m.y-y)
let o=Math.max(0,1-d/200)
if(o>0){
ctx.fillStyle=`rgba(0,255,255,${o*0.15})`
ctx.fillRect(x,y,38,38)
}
}}
requestAnimationFrame(draw)
}
draw()

</script>

</body>
</html>
