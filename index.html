<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptNow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#000;color:#fff;overflow:hidden}

/* NAV */
nav{
  position:fixed;
  top:0;width:100%;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  z-index:10;
}

.nav-links span{margin-left:20px;cursor:pointer;opacity:.7}
.nav-links span:hover{opacity:1;color:#00ffcc}

/* SECTIONS */
section{display:none;min-height:100vh;padding-top:90px}
section.active{display:block}

/* HERO */
.hero{text-align:center;margin-top:120px}
.hero h1{font-size:60px}
.hero span{color:#00ffcc}

/* SEARCH BAR (RESTORED) */
.search{
  margin:20px auto;
  display:block;
  width:80%;
  max-width:420px;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#111;
  color:white;
  outline:none;
}

/* GRID */
.container{
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#00ffcc;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* COPY */
.copy-btn{
  width:100%;
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:white;
  cursor:pointer;
}

/* TOAST */
#toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#00ffcc;
  color:#000;
  padding:12px 20px;
  border-radius:12px;
  font-weight:bold;
  opacity:0;
  transition:0.3s;
  z-index:9999;
}

#toast.show{opacity:1;bottom:50px}
</style>
</head>

<body>

<div id="toast">Copied Script Successfully.</div>

<nav>
<div>ScriptNow</div>
<div class="nav-links">
<span onclick="show('home')">Home</span>
<span onclick="show('scripts')">Scripts</span>
<span onclick="show('executors')">Executors</span>
<span onclick="show('about')">About</span>
</div>
</nav>

<!-- HOME -->
<section id="home" class="active">
<div class="hero">
<h1>Elite <br><span>Script Hub</span></h1>
<p>Premium Roblox Scripts</p>
</div>
</section>

<!-- SCRIPTS (SEARCH RESTORED HERE) -->
<section id="scripts">

<input class="search" id="searchBar" placeholder="Search scripts..." onkeyup="search()">

<div class="container">

<div class="card">
<img src="https://i.ytimg.com/vi/OR3HDLmVJlk/maxresdefault.jpg">
<div class="card-content">
<h3>Infinite Yield</h3>
<button class="copy-btn" onclick="copy(`loadstring(game:HttpGet('https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source'))()`)">Copy Script</button>
</div></div>

<div class="card">
<img src="https://i.ytimg.com/vi/H_C1PSElQGw/maxresdefault.jpg">
<div class="card-content">
<h3>HoHo Hub</h3>
<button class="copy-btn" onclick="copy(`loadstring(game:HttpGet('https://raw.githubusercontent.com/acsu123/HOHO_H/main/Loading_UI'))()`)">Copy Script</button>
</div></div>

<div class="card">
<img src="https://i.ytimg.com/vi/N6Un-tdrFJw/maxresdefault.jpg">
<div class="card-content">
<h3>Quantum Onyx</h3>
<button class="copy-btn" onclick="copy(`loadstring(game:HttpGet('https://raw.githubusercontent.com/flazhy/QuantumOnyx/refs/heads/main/QuantumOnyx.lua'))()`)">Copy Script</button>
</div></div>

</div>
</section>

<!-- EXECUTORS -->
<section id="executors">
<div class="hero">
<h1>Executors</h1>
<p>Mobile & PC</p>
</div>

<div class="container">

<div class="card"><div class="card-content">
<h3>Mobile</h3>
<p>Delta • Cryptic • Vega X • Codex</p>
</div></div>

<div class="card"><div class="card-content">
<h3>PC</h3>
<p>Volt • Wave • Xeno • Solara</p>
</div></div>

</div>
</section>

<!-- ABOUT -->
<section id="about">
<div class="hero">
<h1>About</h1>
<p>Script Dashboard</p>
</div>
</section>

<script>

function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

function copy(text){
navigator.clipboard.writeText(text)
const t=document.getElementById("toast")
t.classList.add("show")
setTimeout(()=>t.classList.remove("show"),3000)
}

/* SEARCH FUNCTION (FIXED) */
function search(){
let input=document.getElementById("searchBar").value.toLowerCase()
document.querySelectorAll(".card").forEach(card=>{
card.style.display=card.innerText.toLowerCase().includes(input)?"block":"none"
})
}

</script>

</body>
</html>
