<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LUNA Key Generator</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: white;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
            cursor: not-allowed;
        }

        #keyBox {
            margin-top: 20px;
            font-size: 20px;
            color: #22c55e;
        }

        #cooldown {
            margin-top: 10px;
            color: #facc15;
        }
    </style>
</head>
<body>

    <h1>LUNA Key Generator</h1>
    <button id="genBtn">Generate Key</button>

    <div id="keyBox"></div>
    <div id="cooldown"></div>

<script>
    const btn = document.getElementById("genBtn");
    const keyBox = document.getElementById("keyBox");
    const cooldownText = document.getElementById("cooldown");

    const COOLDOWN_TIME = 24 * 60 * 60 * 1000; // 24 hours

    function generateKey() {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let result = "LUNA_";

        for (let i = 0; i < 8; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        return result;
    }

    function checkCooldown() {
        const lastGen = localStorage.getItem("lastKeyTime");

        if (lastGen) {
            const now = Date.now();
            const diff = now - parseInt(lastGen);

            if (diff < COOLDOWN_TIME) {
                const remaining = COOLDOWN_TIME - diff;
                const hours = Math.floor(remaining / (1000 * 60 * 60));
                const mins = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));

                btn.disabled = true;
                cooldownText.innerText = `Come back in ${hours}h ${mins}m`;
                return;
            }
        }

        btn.disabled = false;
        cooldownText.innerText = "";
    }

    btn.addEventListener("click", () => {
        const key = generateKey();
        keyBox.innerText = key;

        localStorage.setItem("lastKeyTime", Date.now().toString());

        checkCooldown();
    });

    checkCooldown();
</script>

</body>
</html>
