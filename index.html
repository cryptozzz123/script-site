<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptNow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

#cubes{
  position:fixed;
  inset:0;
  z-index:-1;
  opacity:0.7;
}

/* CURSOR */
.lightning{
  position:fixed;
  width:18px;
  height:18px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle,#00ffcc,transparent);
  box-shadow:0 0 20px #00ffcc;
  transform:translate(-50%,-50%);
  z-index:999;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  z-index:10;
}

.nav-links span{
  margin-left:20px;
  cursor:pointer;
  opacity:.7;
  transition:0.3s;
}

.nav-links span:hover{
  opacity:1;
  color:#00ffcc;
}

/* SECTIONS */
section{
  display:none;
  min-height:100vh;
  padding-top:90px;
}

section.active{
  display:block;
}

/* HERO */
.hero{
  text-align:center;
  margin-top:120px;
}

.hero h1{
  font-size:60px;
}

.hero span{
  color:#00ffcc;
  text-decoration:underline;
}

.hero button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  cursor:pointer;
}

.hero button:hover{
  background:#00ffcc;
}

/* GRID */
.container{
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
  cursor:none;
}

.card:hover{
  transform:translateY(-8px);
  border-color:#00ffcc;
  box-shadow:0 0 20px rgba(0,255,204,0.25);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-content{
  padding:12px;
}

.desc{font-size:11px;color:#aaa}
.long-desc{font-size:11px;color:#777}

.copy-btn{
  width:100%;
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:white;
  color:black;
  cursor:pointer;
}

.copy-btn:hover{
  background:#00ffcc;
}

/* SEARCH */
.search{
  margin:20px auto;
  display:block;
  width:80%;
  max-width:400px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="cubes"></canvas>
<div class="lightning" id="lightning"></div>

<nav>
  <div>ScriptNow</div>
  <div class="nav-links">
    <span onclick="show('home')">Home</span>
    <span onclick="show('scripts')">Scripts</span>
    <span onclick="show('about')">About</span>
  </div>
</nav>

<!-- HOME (UPDATED ONLY HERE) -->
<section id="home" class="active">

  <div class="hero">
    <h1>Made with Elite <br><span>Power</span></h1>
    <p>Premium Roblox Script Hub</p>
    <p>Created in 2026</p>
    <button onclick="show('scripts')">Explore Scripts</button>
  </div>

  <!-- FEATURED HOME SCRIPTS -->
  <div class="container">

    <div class="card">
      <img src="https://i.ytimg.com/vi/OR3HDLmVJlk/maxresdefault.jpg">
      <div class="card-content">
        <h3>Infinite Yield</h3>
        <div class="desc">Universal Admin Script</div>
        <div class="long-desc">Featured on Homepage</div>
        <button class="copy-btn" onclick="show('scripts')">Get Script Now</button>
      </div>
    </div>

    <div class="card">
      <img src="https://i.ytimg.com/vi/N6Un-tdrFJw/maxresdefault.jpg">
      <div class="card-content">
        <h3>Quantum Onyx</h3>
        <div class="desc">Blox Fruits Hub</div>
        <div class="long-desc">Featured on Homepage</div>
        <button class="copy-btn" onclick="show('scripts')">Get Script Now</button>
      </div>
    </div>

  </div>

</section>

<!-- SCRIPTS (UNCHANGED) -->
<section id="scripts">
<input class="search" placeholder="Search..." onkeyup="search()">

<div class="container">
<!-- your existing scripts stay here unchanged -->
</div>
</section>

<!-- ABOUT -->
<section id="about">
<div class="hero">
<h1>About</h1>
<p>ScriptNow UI</p>
</div>
</section>

<script>

function show(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

function search(){
  let v=document.querySelector('.search').value.toLowerCase()
  document.querySelectorAll('.card').forEach(c=>{
    c.style.display=c.innerText.toLowerCase().includes(v)?'block':'none'
  })
}

const l=document.getElementById("lightning");

document.addEventListener("mousemove",(e)=>{
  l.style.left=e.clientX+"px";
  l.style.top=e.clientY+"px";
});

/* background grid */
const bg=document.getElementById("bg");
const ctx=bg.getContext("2d");

function resize(){
  bg.width=window.innerWidth;
  bg.height=window.innerHeight;
}
resize();

function draw(){
  ctx.clearRect(0,0,bg.width,bg.height);
  ctx.strokeStyle="rgba(255,255,255,0.05)";
  let g=50;

  for(let x=0;x<bg.width;x+=g){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,bg.height);
    ctx.stroke();
  }

  for(let y=0;y<bg.height;y+=g){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(bg.width,y);
    ctx.stroke();
  }

  requestAnimationFrame(draw);
}
draw();

/* cubes */
const cube=document.getElementById("cubes");
const c=cube.getContext("2d");

function resize2(){
  cube.width=window.innerWidth;
  cube.height=window.innerHeight;
}
resize2();

let cubes=[];
for(let i=0;i<20;i++){
  cubes.push({
    x:Math.random()*window.innerWidth,
    y:Math.random()*window.innerHeight,
    s:20+Math.random()*30,
    v:0.3+Math.random()
  });
}

function drawCubes(){
  c.clearRect(0,0,cube.width,cube.height);

  cubes.forEach(b=>{
    b.y-=b.v;
    if(b.y<-50)b.y=window.innerHeight+50;

    c.strokeStyle="rgba(0,255,204,0.2)";
    c.strokeRect(b.x,b.y,b.s,b.s);
  });

  requestAnimationFrame(drawCubes);
}
drawCubes();

</script>

</body>
</html>
