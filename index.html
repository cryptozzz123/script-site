<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptNow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ✨ GRID BACKGROUND */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  opacity:0.4;
}

/* ✨ NAVBAR GLASS EFFECT */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(15px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  z-index:10;
}

.nav-links span{
  margin-left:20px;
  cursor:pointer;
  opacity:.7;
  transition:0.3s;
}

.nav-links span:hover{
  opacity:1;
  color:#00ffcc;
}

/* ✨ SECTIONS ANIMATION */
section{
  display:none;
  min-height:100vh;
  padding-top:100px;
  opacity:0;
  transform:translateY(10px);
  transition:0.5s ease;
}

section.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* ✨ HERO */
.hero{
  text-align:center;
  margin-top:120px;
}

.hero h1{
  font-size:60px;
  animation: glow 2s infinite alternate;
}

.hero span{
  text-decoration:underline;
  color:#00ffcc;
}

.hero button{
  margin-top:20px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover{
  background:#00ffcc;
  box-shadow:0 0 20px rgba(0,255,204,0.4);
}

/* ✨ CARD GRID */
.container{
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:25px;
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 0 25px rgba(255,255,255,0.08);
  border-color:rgba(0,255,204,0.3);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.desc{
  font-size:11px;
  color:#aaa;
}

.long-desc{
  font-size:11px;
  color:#777;
}

.copy-btn{
  width:100%;
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:white;
  color:black;
  cursor:pointer;
  transition:0.3s;
}

.copy-btn:hover{
  background:#00ffcc;
  box-shadow:0 0 15px rgba(0,255,204,0.4);
}

/* ✨ SEARCH */
.search{
  margin:20px auto;
  display:block;
  width:80%;
  max-width:400px;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
  outline:none;
}

.search:focus{
  box-shadow:0 0 10px rgba(0,255,204,0.3);
}

/* ✨ ANIMATION */
@keyframes glow{
  from{text-shadow:0 0 10px #00ffcc;}
  to{text-shadow:0 0 25px #00ffcc;}
}

.coming{
  text-align:center;
  font-size:30px;
  padding:50px;
  color:#888;
}
</style>
</head>

<body>

<canvas id="grid"></canvas>

<nav>
  <div>ScriptNow</div>
  <div class="nav-links">
    <span onclick="showSection('home')">Home</span>
    <span onclick="showSection('scripts')">Scripts</span>
    <span onclick="showSection('about')">About</span>
  </div>
</nav>

<!-- HOME -->
<section id="home" class="active">
  <div class="hero">
    <h1>Made with Elite <br><span>Power</span></h1>
    <p>Premium Roblox Script Hub</p>
    <button onclick="showSection('scripts')">Explore Scripts</button>
  </div>
</section>

<!-- SCRIPTS -->
<section id="scripts">
<input class="search" id="search" placeholder="Search scripts..." onkeyup="searchScripts()">

<div class="container">

<!-- CARD -->
<div class="card">
<img src="https://i.ytimg.com/vi/OR3HDLmVJlk/maxresdefault.jpg">
<div class="card-content">
<h3>Infinite Yield</h3>
<div class="desc">Universal Script</div>
<div class="long-desc">Status: Operational</div>
<button class="copy-btn" onclick="copyScriptText('loadstring(game:HttpGet(`https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source`))()')">Copy Script</button>
</div>
</div>

<div class="card">
<img src="https://i.ytimg.com/vi/H_C1PSElQGw/maxresdefault.jpg">
<div class="card-content">
<h3>HoHo Hub</h3>
<div class="desc">Multi Game Support</div>
<div class="long-desc">Status: Operational</div>
<button class="copy-btn" onclick="copyScriptText('loadstring(game:HttpGet(`https://raw.githubusercontent.com/acsu123/HOHO_H/main/Loading_UI`))()')">Copy Script</button>
</div>
</div>

</div>

<div class="coming">More Scripts Coming Soon...</div>
</section>

<!-- ABOUT -->
<section id="about">
<div class="hero">
<h1>About</h1>
<p>ScriptNow UI Upgrade Version</p>
<p>Built for learning & UI practice</p>
</div>
</section>

<script>

/* SECTION SWITCH */
function showSection(id){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

/* COPY */
function copyScriptText(text){
  navigator.clipboard.writeText(text)
  alert("Copied!")
}

/* SEARCH */
function searchScripts(){
  let input=document.getElementById('search').value.toLowerCase()
  document.querySelectorAll('.card').forEach(card=>{
    card.style.display=card.innerText.toLowerCase().includes(input)
    ?'block':'none'
  })
}

/* ✨ MOVING GRID BACKGROUND */
const canvas=document.getElementById("grid");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="rgba(255,255,255,0.05)";
  let gap=40;

  for(let x=0;x<canvas.width;x+=gap){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<canvas.height;y+=gap){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
